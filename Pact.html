<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pact — Daily Accountability</title>
<link rel="stylesheet" href="styles.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  body { background: #14130f; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  #stage { display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<div id="stage"><div id="root"></div></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="today.jsx"></script>
<script type="text/babel" src="history.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script type="text/babel">
const PACT_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "warm-gold",
  "showInsight": true
}/*EDITMODE-END*/;

function Root() {
  const [tweaks, setTweak] = useTweaks(PACT_DEFAULTS);

  React.useEffect(() => {
    const root = document.documentElement;
    if (tweaks.accent === 'warm-gold') {
      root.style.setProperty('--you', 'oklch(0.62 0.13 70)');
      root.style.setProperty('--you-dim', 'oklch(0.72 0.10 70)');
      root.style.setProperty('--you-soft', 'oklch(0.95 0.03 70)');
      root.style.setProperty('--you-glow', 'oklch(0.62 0.13 70 / 0.10)');
    } else if (tweaks.accent === 'forest') {
      root.style.setProperty('--you', 'oklch(0.50 0.10 155)');
      root.style.setProperty('--you-dim', 'oklch(0.62 0.09 155)');
      root.style.setProperty('--you-soft', 'oklch(0.94 0.025 155)');
      root.style.setProperty('--you-glow', 'oklch(0.50 0.10 155 / 0.10)');
    } else if (tweaks.accent === 'ember') {
      root.style.setProperty('--you', 'oklch(0.58 0.16 32)');
      root.style.setProperty('--you-dim', 'oklch(0.70 0.12 32)');
      root.style.setProperty('--you-soft', 'oklch(0.95 0.025 32)');
      root.style.setProperty('--you-glow', 'oklch(0.58 0.16 32 / 0.10)');
    } else if (tweaks.accent === 'ink') {
      root.style.setProperty('--you', 'oklch(0.30 0.020 250)');
      root.style.setProperty('--you-dim', 'oklch(0.50 0.016 250)');
      root.style.setProperty('--you-soft', 'oklch(0.94 0.005 250)');
      root.style.setProperty('--you-glow', 'oklch(0.30 0.020 250 / 0.08)');
    }
  }, [tweaks.accent]);

  return (
    <>
      <IOSDevice width={402} height={874} dark={false}>
        <PactApp/>
      </IOSDevice>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Identity">
          <TweakRadio
            label="Your accent"
            value={tweaks.accent}
            onChange={(v) => setTweak('accent', v)}
            options={[
              { label: 'Gold', value: 'warm-gold' },
              { label: 'Forest', value: 'forest' },
              { label: 'Ember', value: 'ember' },
              { label: 'Ink', value: 'ink' },
            ]}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Root/>);
</script>
</body>
</html>
